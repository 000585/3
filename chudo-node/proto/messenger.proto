syntax = "proto3";
package chudo.messenger;

service Messenger {
  rpc SendMessage (SendMessageRequest) returns (SendMessageResponse);
  rpc SubscribeMessages (SubscribeRequest) returns (stream Message);
  rpc GetHistory (HistoryRequest) returns (HistoryResponse);
  rpc GetIdentity (IdentityRequest) returns (IdentityResponse);
  rpc ClaimRewards (ClaimRequest) returns (ClaimResponse);
}

message SendMessageRequest {
  string to = 1;
  string content = 2;
  string channel = 3;
}

message SendMessageResponse {
  string message_id = 1;
  bool success = 2;
  string error = 3;
}

message SubscribeRequest {
  string channel = 1;
}

message Message {
  string id = 1;
  string from = 2;
  string to = 3;
  string content = 4;
  int64 timestamp = 5;
  string signature = 6;
  string channel = 7;
  // ????? ???? ??? ??????????
  bool is_encrypted = 8;
  string nonce = 9; 
}

message HistoryRequest {
  string with_user = 1;
  string channel = 2;
  int64 from_timestamp = 3;
  int32 limit = 4;
}

message HistoryResponse {
  repeated Message messages = 1;
}

message IdentityRequest {}

message IdentityResponse {
  string public_key = 1;
  string peer_id = 2;
  string nickname = 3;
  // ???? ??? ??????????
  string encryption_public_key = 4;
}

message ClaimRequest {
  string blockchain_address = 1;
}

message ClaimResponse {
  string claim_id = 1;
  uint64 amount = 2;
  bool success = 3;
}
